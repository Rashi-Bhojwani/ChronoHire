<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Primary SEO -->
  <title>ChronoHire | Recruitment Agency India - Hiring Platform</title>

  <meta name="description"
    content="ChronoHire is a recruitment agency in India offering AI-powered hiring, staffing, and talent acquisition solutions for businesses and job seekers." />

  <meta name="keywords"
    content="ChronoHire, recruitment company, recruitment agency India, AI recruitment, hiring platform, hiring solutions, staffing services, talent acquisition, HR consulting, executive search, IT recruitment, permanent staffing, recruitment process outsourcing, job consultancy, jobs in India, career opportunities" />

  <meta name="author" content="ChronoHire" />

  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <link rel="canonical" href="https://chronohire.com/" />

  <!-- Theme -->
  <meta name="theme-color" content="#0F172A" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ChronoHire" />
  <meta property="og:locale" content="en_IN" />
  <meta property="og:title" content="ChronoHire | Recruitment Agency India - Hiring Platform" />
  <meta property="og:description"
    content="AI-powered recruitment platform helping companies hire faster and professionals find rewarding career opportunities across India." />
  <meta property="og:url" content="https://chronohire.com/" />
  <meta property="og:image" content="https://chronohire.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="ChronoHire - Recruitment Agency India" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ChronoHire | Recruitment Agency India" />
  <meta name="twitter:description"
    content="AI-powered recruitment, staffing, and talent acquisition solutions for businesses and job seekers in India." />
  <meta name="twitter:image" content="https://chronohire.com/og-image.png" />

  <!-- Google Verification -->
  <meta name="google-site-verification" content="hJ23JZAKBKmcO0dY7nkSsLhXu-5MY_bCn7tO58orGbc" />

  <!-- Performance: preconnect / dns-prefetch -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ChronoHire",
    "url": "https://chronohire.com",
    "logo": "https://chronohire.com/logo.png",
    "description": "ChronoHire is a recruitment agency in India offering AI-powered hiring, staffing, executive search, and talent acquisition solutions for businesses and job seekers.",
    "sameAs": [
      "https://www.linkedin.com/company/chronohire",
      "https://www.facebook.com/chronohire",
      "https://twitter.com/chronohire",
      "https://www.instagram.com/chronohire"
    ]
  }
  </script>

  <!-- Structured Data: Website + SearchAction -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ChronoHire",
    "url": "https://chronohire.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://chronohire.com/jobs?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
